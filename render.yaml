services:
  # 1. Backend Web Service (Docker)
  - type: web
    name: dating-app-api
    runtime: docker
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: TokenKey
        value: DatingAppSuperSecretKeyForProductionThatIsLongEnoughToSatisfyHmacSha512Algorithm2026
      - key: AllowedOrigins
        value: https://dating-app-y9s4.vercel.app

  # 2. Frontend Static Site (Angular)
  - type: web
    name: dating-app-frontend
    runtime: static
    buildCommand: "cd client && npm install --legacy-peer-deps && npm run build"
    staticPublishPath: "./client/dist/client"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
